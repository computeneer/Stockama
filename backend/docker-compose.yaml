services:
   posgresql:
      container_name: Stockama.Postgresql
      image: postgres
      restart: always
      ports:
         - "${STOCKAMA_DB_PORT}:5432"
      networks:
         - backendnetwork
      volumes:
         - pgdata:/var/lib/postgresql
      env_file:
         - ./.env
      environment:
         - POSTGRES_USER=${STOCKAMA_DB_USERNAME}
         - POSTGRES_PASSWORD=${STOCKAMA_DB_PASSWORD}
   rabbitmq:
      container_name: Stockama.RabbitMQ
      image: rabbitmq:3-management
      restart: always
      ports:
         - "${STOCKAMA_RABBITMQ_PORT:-5672}:5672"
         - "15672:15672"
      networks:
         - backendnetwork
      environment:
         - RABBITMQ_DEFAULT_USER=${STOCKAMA_RABBITMQ_USER:-guest}
         - RABBITMQ_DEFAULT_PASS=${STOCKAMA_RABBITMQ_PASSWORD:-guest}
   redis:
      container_name: Stockama.Redis
      image: redis
      restart: always
      ports:
         - "${STOCKAMA_REDIS_SERVICE_PORT:-6379}:6379"
      networks:
         - backendnetwork
      env_file:
         - ./.env

networks:
   backendnetwork:
      driver: bridge
   frontendnetwork:
      driver: bridge

volumes:
   pgdata:
